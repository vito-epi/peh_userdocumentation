      contents:
        - user-guide/overview.qmd
        # later uitbreiden:
        # - user-guide/workflows.qmd
        # - user-guide/data-requirements.qmd
        # - user-guide/faq.qmd

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    number-sections: false
    code-copy: true
