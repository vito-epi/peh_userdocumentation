name: Build downloads from Zenodo RDS and publish Quarto site

on:
  workflow_dispatch:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies (and system requirements)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::openxlsx
            any::httr
            any::jsonlite
            any::readxl
            any::dplyr
            any::knitr
            any::rmarkdown


      - name: Build Excel downloads from Zenodo (all DOIs)
        # env:
         # ZENODO_API_KEY: ${{ secrets.ZENODO_API_KEY }}
        run: |
          Rscript scripts/build_all_downloads.R

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install TinyTeX
        run: |
          quarto install tinytex

      - name: Render User Guide PDF
        run: |
          cd user-guide
          quarto render --to pdf
          
      - name: Publish to GitHub Pages (gh-pages)
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}




